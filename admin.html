<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>JEPADOS Admin Dashboard</title>

<style>
body { font-family: Arial; margin:20px; background:#f4f4f4; }
h1 { color:#111; }

.topbar {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:15px;
}

.box {
  background:white;
  padding:15px;
  margin-bottom:15px;
  border-radius:10px;
}

.item {
  padding:10px;
  border-bottom:1px solid #eee;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

button {
  padding:6px 10px;
  cursor:pointer;
  border:none;
  border-radius:5px;
}

.approve { background:green; color:white; }
.reject { background:red; color:white; }
.logout { background:black; color:white; }
</style>

</head>

<body>

<div class="topbar">
<h1>🚜 JEPADOS ADMIN</h1>
<button class="logout" onclick="logout()">Sair</button>
</div>

<div class="box">
<h2>📦 Pedidos em tempo real</h2>
<div id="orders">Carregando...</div>
</div>

<script>

const API = "https://jepados-api.onrender.com";


// 🔐 PROTEÇÃO DE LOGIN
if(localStorage.getItem("admin") !== "true"){
  window.location.href = "admin-login.html";
}


// 🔵 CARREGAR PEDIDOS
async function load(){

  try {
    const res = await fetch(API + "/orders");
    const orders = await res.json();

    document.getElementById("orders").innerHTML =
      orders.map(o => `
        <div class="item">
          <div>
            📦 <b>${o.request}</b><br>
            <small>Status: ${o.status}</small>
          </div>

          <div>
            <button class="approve" onclick="update(${o.id}, 'APPROVED')">✔</button>
            <button class="reject" onclick="update(${o.id}, 'REJECTED')">✖</button>
          </div>
        </div>
      `).join("");

  } catch (err) {
    document.getElementById("orders").innerHTML = "Erro ao carregar pedidos";
  }
}


// 🔵 ATUALIZAR STATUS
async function update(id, status){

  await fetch(API + "/orders/" + id, {
    method: "PATCH",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ status })
  });

  load();
}


// 🔵 LOGOUT
function logout(){
  localStorage.removeItem("admin");
  window.location.href = "admin-login.html";
}


// iniciar
load();
setInterval(load, 3000);

</script>

</body>
</html>
