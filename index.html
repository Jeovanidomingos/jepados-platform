<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>JEPADOS</title>
</head>

<body>
<h1>JEPADOS Platform</h1>

<h2>Máquinas</h2>
<div id="machines"></div>

<h2>Criar pedido</h2>
<input id="txt" placeholder="ex: Escavadora Lubango">
<button onclick="enviar()">Enviar</button>

<h2>Pedidos</h2>
<div id="orders"></div>

<script>
const API = "https://jepados-api.onrender.com";

async function load(){
 const machines = await fetch(API+"/machines").then(r=>r.json());
 document.getElementById("machines").innerHTML =
 machines.map(m=> `<p>${m.name} - ${m.status}</p>`).join("");

 const orders = await fetch(API+"/orders").then(r=>r.json());
document.getElementById("orders").innerHTML =
orders.map(o => `<p><b>${o.request || "Sem texto"}</b> - ${o.status}</p>`).join("");
}

async function enviar(){
  const request = document.getElementById("txt").value;

  if(!request){
    alert("Escreve um pedido primeiro");
    return;
  }

  await fetch(API+"/orders",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      request: request,
      timestamp: new Date().toISOString()
    })
  });

  document.getElementById("txt").value = "";
  load();
}
</script>

</body>
</html>
